<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Expense Copilot — Authorization callback</title>
<style>
  body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;max-width:640px;margin:3rem auto;padding:0 1rem;line-height:1.6;color:#1a1a1a}
  code{display:block;background:#f4f4f5;border:1px solid #ddd;border-radius:8px;padding:1rem;margin:1rem 0;word-break:break-all;font-size:1.05rem}
  button{font-size:1rem;padding:.6rem 1rem;border-radius:8px;border:1px solid #0a66c2;background:#0a66c2;color:#fff;cursor:pointer}
  .muted{color:#666}
</style>
</head>
<body>
<h1>Authorization received</h1>
<p>Copy this code and paste it into the Expense Copilot CLI prompt:</p>
<code id="code">(no code in URL)</code>
<button onclick="navigator.clipboard.writeText(document.getElementById('code').textContent)">Copy code</button>
<p class="muted" id="state"></p>
<script>
  const p = new URLSearchParams(location.search);
  const code = p.get("code") || p.get("authorization_code");
  if (code) document.getElementById("code").textContent = code;
  const st = p.get("state");
  if (st) document.getElementById("state").textContent = "state: " + st;
</script>
</body>
</html>
